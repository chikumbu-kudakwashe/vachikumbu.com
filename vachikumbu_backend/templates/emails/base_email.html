<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
</head>

<body
    style="margin: 0; padding: 0; background-color: #0F1319; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #0F1319; padding: 20px 0;">
        <tr>
            <td align="center">
                <table cellpadding="0" cellspacing="0" border="0" width="600"
                    style="max-width: 600px; background-color: #1A1F2B; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
                    <!-- Header -->
                    <tr>
                        <td style="padding: 40px 40px 20px; text-align: center; border-bottom: 1px solid #2D3443;">
                            <div
                                style="font-size: 28px; font-weight: bold; color: #2ECC71; letter-spacing: -0.5px; margin-bottom: 4px;">
                                VaChikumbu
                            </div>
                            <div
                                style="font-size: 12px; color: #6B7A99; text-transform: uppercase; letter-spacing: 2px;">
                                Backend Engineer • Robotics Developer • ML Enthusiast
                            </div>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 30px 40px; background-color: #161B24; border-top: 1px solid #2D3443;">
                            <table cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td style="text-align: center;">
                                        <div style="font-size: 12px; color: #4D5A73; line-height: 1.8;">
                                            <div style="margin-bottom: 8px;">
                                                <a href="https://vachikumbu.com"
                                                    style="color: #2ECC71; text-decoration: none;">vachikumbu.com</a>
                                            </div>
                                            <div>
                                                Harare, Zimbabwe
                                            </div>
                                            <div style="margin-top: 12px; font-size: 11px; color: #3D4863;">
                                                © {{ current_year }} Vachikumbu. All rights reserved.
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
